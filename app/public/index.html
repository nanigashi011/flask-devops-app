<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #ec4899;
            --accent-dark: #be185d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            margin-bottom: 50px;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card styles */
        .card {
            background: linear-gradient(135deg, var(--surface) 0%, rgba(30, 41, 59, 0.5) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Button styles */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.85rem;
            width: auto;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        /* Items list */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
        }

        .item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item:hover {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
        }

        .item-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
            accent-color: var(--primary);
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .item-title.completed {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .item-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        /* Stats sidebar */
        .stats-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
            border: 1px solid var(--primary);
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Loading state */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert messages */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* Scrollbar styling */
        .items-list::-webkit-scrollbar {
            width: 6px;
        }

        .items-list::-webkit-scrollbar-track {
            background: rgba(99, 102, 241, 0.05);
            border-radius: 3px;
        }

        .items-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .items-list::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>nahahhak</h1>
            <p>Manage your items with a modern, interactive interface</p>
            <span class="status-badge" id="statusBadge">Loading...</span>
        </header>

        <div class="main-grid">
            <!-- Main content -->
            <div>
                <!-- Create form -->
                <div class="card">
                    <h2>Add New Item</h2>
                    <form id="createForm">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" name="title" placeholder="Enter item title" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" placeholder="Add optional description"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>✓</span>
                            <span>Create Item</span>
                        </button>
                    </form>
                    <div id="alerts"></div>
                </div>

                <!-- Items list -->
                <div class="card" style="margin-top: 30px;">
                    <h2>Items</h2>
                    
                    <div class="tabs">
                        <button class="tab active" data-filter="all">All Items</button>
                        <button class="tab" data-filter="active">Active</button>
                        <button class="tab" data-filter="completed">Completed</button>
                    </div>

                    <div id="itemsContainer" class="items-list">
                        <div class="empty-state">
                            <div class="spinner"></div>
                            <p>Loading items...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar stats -->
            <div>
                <div class="card stats-card">
                    <h2>Statistics</h2>
                    
                    <div class="stat-item">
                        <span class="stat-label">Total Items</span>
                        <span class="stat-value" id="statTotal">0</span>
                    </div>
                    
                    <div class="stat-item">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value" id="statCompleted">0</span>
                    </div>
                    
                    <div class="stat-item">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value" id="statPending">0</span>
                    </div>
                    
                    <div class="stat-item">
                        <span class="stat-label">Completion Rate</span>
                        <span class="stat-value" id="statRate">0%</span>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <div class="card">
                    <h2>Server Info</h2>
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">
                        <p style="margin-bottom: 10px;">
                            <strong style="color: var(--text-primary);">Version:</strong>
                            <span>2.0.0</span>
                        </p>
                        <p style="margin-bottom: 10px;">
                            <strong style="color: var(--text-primary);">Status:</strong>
                            <span id="serverStatus">Checking...</span>
                        </p>
                        <p>
                            <strong style="color: var(--text-primary);">Uptime:</strong>
                            <span id="serverUptime">-</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentFilter = 'all';
        let allItems = [];

        // ==================== INITIALIZATION ====================
        async function init() {
            await checkHealth();
            await loadItems();
            await loadStats();
            setInterval(updateUptime, 1000);
        }

        // ==================== API CALLS ====================
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };

            if (body) options.body = JSON.stringify(body);

            const response = await fetch(`${API_URL}${endpoint}`, options);
            return response.json();
        }

        async function checkHealth() {
            try {
                const data = await apiCall('/health');
                document.getElementById('statusBadge').textContent = 'Server Online';
                document.getElementById('serverStatus').textContent = 'Online';
                document.getElementById('serverUptime').textContent = formatUptime(data.uptime);
            } catch (error) {
                document.getElementById('statusBadge').textContent = 'Server Offline';
                document.getElementById('serverStatus').textContent = 'Offline';
                showAlert('Failed to connect to server', 'error');
            }
        }

        async function loadItems() {
            try {
                const data = await apiCall('/items');
                allItems = data.data || [];
                renderItems();
            } catch (error) {
                showAlert('Failed to load items', 'error');
            }
        }

        async function loadStats() {
            try {
                const data = await apiCall('/stats');
                const stats = data.data;
                
                document.getElementById('statTotal').textContent = stats.total;
                document.getElementById('statCompleted').textContent = stats.completed;
                document.getElementById('statPending').textContent = stats.pending;
                document.getElementById('statRate').textContent = stats.completionRate + '%';
                document.getElementById('progressFill').style.width = stats.completionRate + '%';
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function createItem(title, description) {
            try {
                const data = await apiCall('/items', 'POST', { title, description });
                
                if (data.success) {
                    showAlert('Item created successfully!', 'success');
                    document.getElementById('createForm').reset();
                    await loadItems();
                    await loadStats();
                } else {
                    showAlert(data.error || 'Failed to create item', 'error');
                }
            } catch (error) {
                showAlert('Error creating item', 'error');
            }
        }

        async function updateItem(id, updates) {
            try {
                const data = await apiCall(`/items/${id}`, 'PUT', updates);
                
                if (data.success) {
                    await loadItems();
                    await loadStats();
                } else {
                    showAlert(data.error || 'Failed to update item', 'error');
                }
            } catch (error) {
                showAlert('Error updating item', 'error');
            }
        }

        async function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                try {
                    const data = await apiCall(`/items/${id}`, 'DELETE');
                    
                    if (data.success) {
                        showAlert('Item deleted successfully!', 'success');
                        await loadItems();
                        await loadStats();
                    } else {
                        showAlert(data.error || 'Failed to delete item', 'error');
                    }
                } catch (error) {
                    showAlert('Error deleting item', 'error');
                }
            }
        }

        // ==================== UI RENDERING ====================
        function renderItems() {
            const container = document.getElementById('itemsContainer');
            
            let filtered = allItems;
            if (currentFilter === 'active') {
                filtered = allItems.filter(i => !i.completed);
            } else if (currentFilter === 'completed') {
                filtered = allItems.filter(i => i.completed);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No items to display</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="item">
                    <input 
                        type="checkbox" 
                        class="item-checkbox" 
                        ${item.completed ? 'checked' : ''}
                        onchange="toggleItem(${item.id})"
                    >
                    <div class="item-content">
                        <div class="item-title ${item.completed ? 'completed' : ''}">
                            ${escapeHtml(item.title)}
                        </div>
                        ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
                    </div>
                    <div class="item-actions">
                        <button class="btn-small btn-danger" onclick="deleteItem(${item.id})">
                            Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showAlert(message, type = 'success') {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertsContainer.appendChild(alert);

            setTimeout(() => alert.remove(), 3000);
        }

        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hours}h ${minutes}m ${secs}s`;
        }

        function updateUptime() {
            checkHealth();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('createForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            createItem(title, description);
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderItems();
            });
        });

        async function toggleItem(id) {
            const item = allItems.find(i => i.id === id);
            if (item) {
                await updateItem(id, { completed: !item.completed });
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
